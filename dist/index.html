**Symptoms:** Yellowing and wilting of leaf edges, water-soaked streaks, leaves turn straw-colored from tip to base.

**Treatment:**
• Apply copper-based bactericide (e.g., Copper Hydroxide)
• Drain flooded fields immediately
• Reduce nitrogen fertilizer; increase potassium
• Remove and destroy severely infected plants

**Prevention:** Use resistant varieties like NSIC Rc 222. Avoid leaf injuries during farm work.`},{keywords:["rice blast","blast","pyricularia","magnaporthe","leaf blast"],answer:`🌾 **Rice Blast** is caused by the fungus *Pyricularia oryzae* (also called *Magnaporthe oryzae*).

**Symptoms:** Diamond-shaped gray lesions with brown borders on leaves. Can also infect neck and panicle (neck rot).

**Treatment:**
• Apply fungicides with Tricyclazole or Azoxystrobin
• Reduce nitrogen fertilizer to lower susceptibility
• Improve air circulation by proper plant spacing

**Prevention:** Use resistant varieties. Avoid planting during high humidity periods.`},{keywords:["tungro","leafhopper","viral"],answer:`🌾 **Tungro** is a viral disease transmitted by the green leafhopper (*Nephotettix virescens*).

**Symptoms:** Yellow-orange leaf discoloration, stunted growth, reduced tillering.

**Treatment:**
• Control green leafhoppers with insecticide (e.g., Buprofezin)
• Remove and burn infected plants immediately
• There is NO chemical cure — prevention is key

**Prevention:** Plant synchronously in your area, use resistant varieties, avoid ratoon cropping.`},{keywords:["brown spot","bipolaris","brown"],answer:`🌾 **Brown Spot** is caused by *Bipolaris oryzae*, commonly found in nutrient-poor soils.

**Symptoms:** Oval or circular brown spots on leaves with yellow halos. Spots on grain (discolored grain).

**Treatment:**
• Apply Mancozeb or Propiconazole fungicide
• Apply potassium and zinc fertilizer
• Improve soil drainage

**Prevention:** Use certified seeds, maintain balanced soil nutrition, avoid nutrient stress.`},{keywords:["sheath blight","rhizoctonia"],answer:`🌾 **Sheath Blight** is caused by *Rhizoctonia solani*. It affects the leaf sheath near the water line.

**Symptoms:** Oval greenish-gray lesions on sheath, irregular white lesions on leaves, lodging in severe cases.

**Treatment:**
• Apply Validamycin or Azoxystrobin fungicide
• Reduce plant density
• Avoid excessive nitrogen fertilizer

**Prevention:** Practice crop rotation, deep plowing to bury sclerotia, maintain proper spacing.`},{keywords:["prevent disease","avoid disease","stop disease","prevent rice disease"],answer:`🛡️ **How to Prevent Rice Diseases:**

1. Use disease-resistant varieties (ask your DA office for NSIC-registered varieties)
2. Practice crop rotation — avoid continuous rice monoculture
3. Apply balanced fertilizer; avoid excess nitrogen
4. Monitor your fields every 5–7 days for early symptoms
5. Use certified disease-free seeds
6. Maintain proper plant spacing for air circulation
7. Control weeds and field rats
8. Consult your local DA office regularly`},{keywords:["symptoms","signs","identify disease","how to know","detect"],answer:`🔍 **Common Rice Disease Symptoms:**

• **Blast:** Diamond-shaped gray-brown lesions on leaves
• **Bacterial Blight:** Yellowing from leaf tips, water-soaked margins
• **Tungro:** Yellow-orange leaves, stunted plants
• **Brown Spot:** Small oval brown spots with yellow halo
• **Sheath Blight:** Oval lesions on leaf sheath near waterline

💡 Upload a photo to AgriSmartAI for instant AI diagnosis!`},{keywords:["spread","infect other","contagious","neighbor"],answer:`⚠️ **Can it spread?** Yes. Most rice diseases spread through:

• **Wind** (blast, brown spot spores)
• **Water flow** (bacterial blight, sheath blight)
• **Insects** (tungro via leafhoppers)
• **Human contact** (tools, clothing)

**To prevent spread:**
• Remove infected plant parts immediately
• Do not work in wet fields
• Clean tools between fields
• Apply preventive treatment to nearby plants`},{keywords:["treatment","cure","medicine","fungicide","spray","chemical"],answer:`💊 **General Rice Disease Treatments:**

• **Fungal diseases** (Blast, Brown Spot, Sheath Blight): Use Tricyclazole, Mancozeb, Azoxystrobin, or Propiconazole
• **Bacterial diseases** (Bacterial Blight): Use copper-based bactericides
• **Viral diseases** (Tungro): No direct cure — control the insect vector (leafhopper)

⚠️ Always follow label dosage. Apply early morning or late afternoon. Wear protective gear.

For severe cases, visit your DA office for free assistance.`},{keywords:["healthy","no disease","good condition","normal"],answer:`✅ **Your rice leaf is healthy!** Great news.

**To keep it healthy:**
• Continue monitoring fields every 5–7 days
• Practice Alternate Wetting and Drying (AWD) for water management
• Apply balanced fertilizer — avoid excessive nitrogen
• Keep fields weed-free
• Remove volunteer rice and pests early

💡 Scan regularly — early detection prevents outbreaks!`},{keywords:["fertilizer","nutrient","feed","npk","14-14-14","urea","46-0-0"],answer:`🌱 **Fertilizer Guide for Rice:**

**Recommended per hectare:**
• **Basal (before transplanting):** 14-14-14 complete fertilizer — 4 bags (200 kg)
• **Tillering stage (20–25 days):** 46-0-0 Urea — 2 bags (100 kg)
• **Panicle initiation (45–50 days):** 46-0-0 Urea — 1 bag (50 kg)

⚠️ Always base fertilizer rates on a soil test. Contact your DA office for free soil analysis.

💡 **Tip:** Avoid too much nitrogen — it increases blast and blight susceptibility.`},{keywords:["soil test","soil analysis","soil health"],answer:`🧪 **Soil Testing for Rice:**

Soil testing tells you exactly how much fertilizer your field needs.

**Where to get soil tested:**
• DA Regional Field Office — FREE for registered farmers
• PhilRice Regional Stations
• State universities with agriculture programs

**What to bring:** 500g soil sample from 10 spots in your field (0–15cm depth), mixed together.

**Results will show:** pH, nitrogen, phosphorus, potassium, organic matter content.

Contact DA New Bataan Agricultural Center: (084) 123-4567`},{keywords:["organic","compost","manure","organic fertilizer"],answer:`♻️ **Organic Fertilizers for Rice:**

• **Compost:** Apply 2–3 tons/hectare 1–2 weeks before planting
• **Vermicompost:** Apply 1–2 tons/hectare, more nutrient-dense
• **Rice straw compost:** Return cut straw to the field after harvest
• **Green manure (Azolla):** Grow in field 2 weeks before transplanting for nitrogen
• **Farmyard manure:** Apply 5 tons/hectare basal

**Benefits:** Improves soil structure, water retention, and reduces chemical fertilizer cost by 30–50%.`},{keywords:["potassium","phosphorus","zinc","micronutrient","deficiency"],answer:`⚗️ **Nutrient Deficiency in Rice:**

• **Nitrogen deficiency:** Pale green/yellow leaves starting from older leaves
  → Apply Urea (46-0-0)
• **Phosphorus deficiency:** Purplish discoloration on leaves
  → Apply Complete (14-14-14) or Superphosphate
• **Potassium deficiency:** Brown leaf tips and margins (similar to blight)
  → Apply Muriate of Potash (0-0-60)
• **Zinc deficiency:** Brown rusty spots on young leaves (Bronzing)
  → Apply Zinc Sulfate (1 kg/ha foliar spray)`},{keywords:["fertilizer schedule","when to apply fertilizer","fertilizer timing","application time"],answer:`📅 **Rice Fertilizer Application Schedule:**

| Stage | Days After Transplant | Fertilizer |
|---|---|---|
| Basal | 0 (before planting) | 14-14-14, 4 bags/ha |
| Early tillering | 20–25 DAT | Urea, 2 bags/ha |
| Panicle initiation | 45–50 DAT | Urea, 1 bag/ha |

💡 **Tip:** Split nitrogen application reduces disease risk and improves uptake. Never apply fertilizer on flooded field — wait for 2–3 cm water level only.`},{keywords:["when to plant","planting time","planting season","best time to plant","new bataan"],answer:`📅 **Best Planting Time for Rice:**

**New Bataan, Davao de Oro:**
• **Wet Season (Unahan):** June–July
• **Dry Season (Ulahing):** November–December

**General Philippines:**
• **Wet Season:** May–July
• **Dry Season:** November–January

💡 Plant synchronized with your neighbors to control pests and diseases better. Contact DA New Bataan for the local planting calendar.`},{keywords:["seed rate","seeds per hectare","how many seeds","seeding rate"],answer:`🌱 **Seeding Rates for Rice:**

• **Transplanting:** 40–50 kg seeds/hectare (soak 24 hrs, incubate 24 hrs in sack before sowing in seedbed)
• **Direct seeding (dry):** 60–80 kg/ha
• **Direct seeding (wet):** 80–100 kg/ha

**Seedbed preparation:**
• Use 400 m² seedbed per hectare of field
• Sow pre-germinated seeds thinly
• Transplant at 14–21 days old (2–3 leaf stage)
• Do not use seedlings older than 21 days`},{keywords:["transplanting","how to transplant","plant spacing","spacing"],answer:`🌾 **Rice Transplanting Guide:**

**Best age to transplant:** 14–21 days (2–3 leaves)

**Plant spacing:**
• Standard: 20 cm × 20 cm
• Preferred (Sistema de Arroz Intensificado): 25 cm × 25 cm

**Tips:**
• Transplant 2–3 seedlings per hill
• Plant at 2–3 cm depth — not too deep
• Transplant in straight rows using a rope guide for easy weeding
• Avoid transplanting during midday heat — do it early morning or late afternoon`},{keywords:["land preparation","plow","harrowing","prepare field"],answer:`🚜 **Land Preparation for Rice:**

1. **First plowing:** 3–4 weeks before transplanting (20–25 cm deep)
2. **Flooding:** Flood field 1–2 weeks after first plowing
3. **Second plowing (harrowing):** 1–2 weeks before transplanting to break clods
4. **Leveling:** Use leveler or drag board for uniform water depth
5. **Final harrowing:** 3–5 days before transplanting

💡 **Tip:** Add lime (1–2 bags/ha) if soil pH is below 5.5. Let it sit for 1 week before final harrowing.`},{keywords:["variety","varieties","nsic","seed variety","which variety","inbred","hybrid"],answer:`🌾 **Recommended Rice Varieties:**

**Inbred (for small farmers):**
• NSIC Rc 222 (Tubigan 18) — blast resistant, 110 days, 5–6 t/ha
• NSIC Rc 160 (Tubigan 7) — blight tolerant, 112 days
• NSIC Rc 9 (Apo) — drought tolerant

**Hybrid (for commercial farmers):**
• SL8 H, Mestizo, Bigante 2 — 8–12 t/ha potential

**For disease-affected areas:** Ask your DA office which varieties are resistant to the diseases common in your area.

DA New Bataan: (084) 123-4567`},{keywords:["harvest","when to harvest","harvesting time","ready to harvest","maturity"],answer:`🌾 **When to Harvest Rice:**

**Harvest when:**
• 80–85% of grains have turned golden yellow/straw-colored
• 25–30 days after 50% heading (flowering)
• Grain moisture content: 20–25%

**Signs of over-maturity:**
• Excessive grain shattering
• Brownish, dull appearance

💡 **Tip:** Harvest early morning to reduce shattering losses. Avoid harvesting during rain to prevent post-harvest losses.`},{keywords:["threshing","thresh","how to thresh"],answer:`⚙️ **Threshing Guide:**

• **Thresh within 24 hours** of harvesting to prevent grain deterioration
• Use mechanical thresher for faster and cleaner threshing (reduces losses by 5%)
• For manual threshing: beat bundles against a hard surface over a tarpaulin
• **Winnow** (paglalaho) to remove chaff and empty grains
• **Target:** Less than 2% threshing loss

💡 DA has thresher units available for rent through the AgriMech program. Contact DA New Bataan.`},{keywords:["dry","drying","grain moisture","sun drying"],answer:`☀️ **Grain Drying After Harvest:**

**Target moisture content for storage:** 14% or below

**Sun drying:**
• Spread 5–7 cm thick on clean tarpaulin
• Turn every 2 hours
• 2–3 sunny days needed (from 25% to 14%)
• Do NOT dry on concrete roads — absorbs heat unevenly and cracks grain

**Mechanical dryer:**
• More reliable during rainy season
• Available through DA AgriMech program
• Capacity: 2–10 tons per batch

⚠️ Never store rice at more than 14% moisture — it will mold.`},{keywords:["store","storage","palay storage","silo","bag"],answer:`🏪 **Rice/Palay Storage Tips:**

• Store in **clean, dry, sealed bags** (preferably triple-bag with inner liner)
• Keep bags **off the floor** — use wooden pallets
• Store in a **well-ventilated room** away from direct sunlight
• **Target moisture:** 14% or below
• Check regularly for **weevils, rats, and mold**
• Use **hercon strips or phosphine tablets** for insect control (follow safety instructions)

**Expected shelf life at 14% moisture:** 6–12 months without significant quality loss.`},{keywords:["yield","how many bags","production","how much rice","harvest yield"],answer:`📊 **Expected Rice Yield per Hectare:**

| Variety Type | Expected Yield |
|---|---|
| Traditional/Old varieties | 2–3 tons (33–50 cav) |
| Inbred NSIC varieties | 4–6 tons (67–100 cav) |
| Hybrid varieties | 6–10 tons (100–167 cav) |

**1 ton = ~16.7 cavans (60 kg/cavan)**

**To maximize yield:**
• Use certified seeds
• Follow proper fertilizer schedule
• Control diseases and pests early
• Harvest at the right time

Contact your DA technician for yield gap analysis.`},{keywords:["pest","insect","ipm","integrated pest","control pest"],answer:`🐛 **Integrated Pest Management (IPM) for Rice:**

1. **Cultural control:** Synchronize planting, clean fields, rotate crops
2. **Biological control:** Conserve natural enemies (spiders, frogs, dragonflies)
3. **Mechanical control:** Hand-picking, light traps, rat traps
4. **Chemical control (LAST resort):** Use insecticide only when pest exceeds Economic Threshold Level (ETL)

💡 **Philippine law (RA 10068)** promotes organic farming — minimize chemical use. Consult DA for pest scouting and ETL guidelines.`},{keywords:["brown planthopper","bph","planthopper","hopper burn"],answer:`🦗 **Brown Planthopper (BPH)** — *Nilaparvata lugens*

Most destructive rice pest. Causes "hopper burn" — circular patches of dried, dead rice.

**ETL:** 15 hoppers per hill

**Control:**
• Drain field for 3–4 days to expose hoppers
• Apply Buprofezin, Imidacloprid, or Etofenprox (drench at base of plants)
• Avoid broad-spectrum insecticides — they kill natural enemies
• Use BPH-resistant varieties (NSIC Rc 160, Rc 222)

⚠️ BPH develops resistance quickly — rotate insecticide modes of action.`},{keywords:["stem borer","borer","deadheart","whitehead"],answer:`🐛 **Stem Borer** — Causes "deadheart" (vegetative stage) and "whitehead" (reproductive stage)

**Species:** Yellow stem borer (*Scirpophaga incertulas*), Striped stem borer

**ETL:** 15% deadheart or 10% whitehead

**Control:**
• Apply Cartap Hydrochloride or Chlorantraniliprole granules at tillering
• Remove egg masses manually from seedbed
• Release *Trichogramma* egg parasitoids (DA program)
• Drain field and manually collect larvae

💡 Avoid applying insecticide during flowering — it kills bees and reduces pollination.`},{keywords:["rat","rats","rodent","mice","field rat"],answer:`🐀 **Field Rat Control:**

Rats cause 5–20% yield loss nationwide. Control is critical.

**Control methods:**
1. **Community synchronized trapping** (most effective) — coordinate with neighbors
2. **Rodenticide baiting:** Use zinc phosphide bait stations in field perimeter
3. **Trap barriers:** Plastic sheet barriers around field with funnel traps
4. **Barn owls:** Install owl boxes — 1 owl eats ~1,300 rats/year
5. **Clean field edges:** Remove weeds and debris where rats nest

⚠️ Do NOT use rodenticide inside the field — it harms wildlife. Place bait OUTSIDE the crop area.`},{keywords:["golden apple snail","kuhol","snail","golden snail"],answer:`🐌 **Golden Apple Snail (Kuhol)** — *Pomacea canaliculata*

Major pest in transplanted and direct-seeded rice. Can destroy newly transplanted seedlings overnight.

**Control:**
1. **Hand collection** of snails and egg masses (red eggs on above-water surfaces)
2. **Raised nursery beds** — transplant older seedlings (21+ days) which are more resistant
3. **Sanicle barriers:** Place net or sanicle (grass) at irrigation inlets
4. **Niclosamide molluscicide** (last resort, harmful to fish — use with caution)
5. **Ducks:** Release ducks 2 weeks after transplanting

💡 Collected snails can be used as animal feed or compost.`},{keywords:["da office","department of agriculture","da new bataan","da contact","agricultural center"],answer:`🏢 **DA New Bataan Agricultural Center:**

📍 Location: Poblacion, New Bataan, Davao de Oro
📞 Contact: (084) 123-4567

**Services available:**
• Free soil and plant tissue analysis
• Seed subsidy for registered farmers
• Fertilizer subsidy (SURE Aid program)
• Farm machinery (tractors, threshers) — rental and loan
• Extension services and farm visits
• Farmer training and seminars

**Operating hours:** Monday–Friday, 8:00 AM – 5:00 PM

🌐 Website: www.da.gov.ph | Hotline: 1688`},{keywords:["seed subsidy","free seeds","da seeds","certified seeds","nsic seeds"],answer:`🌱 **DA Seed Subsidy Program:**

The DA provides subsidized or free certified seeds to qualified farmers.

**How to apply:**
1. Register as farmer at your Municipal Agriculture Office (MAO)
2. Present your farmers ID (RSBSA registration)
3. Fill out the seed subsidy application form
4. Seeds will be distributed per planting season

**Available seed types:** NSIC-registered inbred rice varieties

**Requirements:**
• RSBSA (Registry System for Basic Sectors in Agriculture) registration
• Valid government ID
• Proof of land ownership or lease agreement

Contact DA New Bataan: (084) 123-4567`},{keywords:["fertilizer subsidy","sure aid","free fertilizer","da fertilizer"],answer:`💼 **DA SURE Aid & Recovery Program:**

The Department of Agriculture provides subsidized fertilizers and farm inputs to registered farmers.

**Eligible farmers:**
• RSBSA-registered farmers
• Small-scale farmers with 5 hectares or less
• Farmers affected by disasters or crop losses

**How to avail:**
1. Register/update your RSBSA record at your Municipal Agriculture Office
2. Attend DA farmer briefing sessions
3. Wait for distribution schedule

**Other programs:** KADIWA ni Ani at Kita (price support), Farm Machinery Loan Program

DA New Bataan: (084) 123-4567`},{keywords:["rsbsa","farmer id","farmer registration","register farmer","farmer registry"],answer:`📋 **How to Register as a Farmer (RSBSA):**

The **Registry System for Basic Sectors in Agriculture (RSBSA)** is your gateway to all DA programs.

**How to register:**
1. Go to your **Municipal Agriculture Office (MAO)** in New Bataan
2. Bring: Valid government ID, land title or lease agreement
3. Fill out RSBSA registration form
4. You will receive a **Farmer ID** within 2–4 weeks

**Benefits of RSBSA:**
• Access to seed, fertilizer, and pesticide subsidies
• PhilHealth (Kalusugan program)
• Crop insurance (PCIC)
• Farm machinery rental

💡 Registration is FREE.`},{keywords:["crop insurance","pcic","palay insurance","farm insurance","insurance"],answer:`🛡️ **Crop Insurance for Rice Farmers (PCIC):**

The **Philippine Crop Insurance Corporation (PCIC)** provides insurance against crop losses due to typhoons, flooding, drought, and pests/diseases.

**Coverage:**
• Up to ₱30,000/hectare (all-risk coverage)
• Up to ₱12,000/hectare (basic coverage)

**How to avail:**
1. Register with RSBSA first
2. Apply at your MAO or DA office
3. Pay premium (subsidized for small farmers — as low as ₱500/ha)

**When to file a claim:** Within 7 days of crop loss occurrence

PCIC Hotline: (02) 8924-9026 | DA New Bataan: (084) 123-4567`},{keywords:["how to use","agrismartai","how does this work","how to scan","upload photo"],answer:`📱 **How to Use AgriSmartAI:**

1. **Create an account** or log in
2. Click **"Upload Image"** in the navigation menu
3. Take a photo of a rice leaf or upload from your gallery
4. Wait 2–5 seconds for the AI to analyze the image
5. View your **Disease Detection Result** with confidence score
6. Read the **Fertilizer Recommendations** and treatment advice
7. Use **this chatbot** to ask follow-up questions
8. View all past results in **History**

💡 For best results: good lighting, leaf fills the frame, use fresh photos of affected leaves.`},{keywords:["water","irrigation","flood","awd","alternate wetting","water management"],answer:`💧 **Water Management for Rice (AWD Method):**

**Alternate Wetting and Drying (AWD)** saves water and reduces disease:

1. Flood field to 2–5 cm depth
2. Let water drop naturally
3. Re-flood when water drops to 15 cm **below soil surface** (use a perforated pipe to check)
4. Repeat throughout season
5. Maintain flooding from **7 days before heading to 7 days after**

**Benefits:**
• Saves 20–30% water
• Reduces methane emissions
