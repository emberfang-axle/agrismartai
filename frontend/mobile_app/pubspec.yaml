name: agrismartai
description: "AgriSmartAI - Rice disease monitoring for New Bataan, Davao de Oro."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: 2.6.1
  supabase_flutter: ^2.8.0
  camera: ^0.10.5+9
  image_picker: ^1.0.7
  permission_handler: ^11.3.1
  path_provider: ^2.1.2
  image: ^4.3.0
  http: ^1.2.2
  http_parser: ^4.0.2
  google_fonts: ^8.1.0
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  intl: ^0.20.2
  url_launcher: ^6.3.1
  shared_preferences: ^2.3.4
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
