<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="AGRISMARTAI - Smart Agriculture">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0B3B1F">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>AgriSmartAI — Smart Farming</title>
  <link rel="manifest" href="manifest.json">
  <style>
    :root { --primary: #0B3B1F; --gold: #D4A017; --bg: #F7FAF8; }
    html, body { height: 100%; margin: 0; background: var(--bg); }
    flt-glass-pane, flutter-view, flt-scene-host, flt-scene { background: var(--bg) !important; }
    #loader {
      position: fixed; inset: 0; z-index: 999999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #0B3B1F 0%, #145A32 50%, #1A6B3C 100%);
      color: white; font-family: system-ui, sans-serif;
      transition: opacity 0.35s ease;
    }
    #loader.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid rgba(255,255,255,0.2);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
      margin-bottom: 18px;
    }
    .loader-title { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; }
    .loader-sub { margin-top: 8px; font-size: 0.85rem; opacity: 0.75; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <div class="loader-title">AgriSmartAI</div>
    <div class="loader-sub">Smart Farming, Better Harvest</div>
  </div>
  <script src="passkeys_bundle.js"></script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
