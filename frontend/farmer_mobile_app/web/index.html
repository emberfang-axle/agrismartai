<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AgriSmartAI — Smart rice disease detection for farmers in New Bataan">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="AgriSmartAI">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>AgriSmartAI</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: linear-gradient(135deg, #0B3B1F 0%, #1B5E20 50%, #2E7D32 100%);
    }
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      color: white;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    #loading .logo {
      width: 80px;
      height: 80px;
      background: #43A047;
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      margin-bottom: 20px;
    }
    #loading h1 {
      color: #D4A017;
      margin: 0 0 8px;
      font-size: 28px;
    }
    #loading p {
      margin: 0 0 24px;
      opacity: 0.8;
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="logo">🌿</div>
    <h1>AgriSmartAI</h1>
    <p>Smart Farming, Better Harvest</p>
    <div class="spinner"></div>
    <p style="margin-top:16px;font-size:13px;">Loading app...</p>
  </div>

  <script>
    window.addEventListener('flutter-first-frame', function () {
      var el = document.getElementById('loading');
      if (el) el.classList.add('hidden');
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
