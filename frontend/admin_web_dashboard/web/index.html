<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AgriSmartAI Admin</title>
  <link rel="icon" type="image/png" href="favicon.png"/>
  <style>
    html, body { margin: 0; height: 100%; background: #0B3B1F; }
    #loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100vh; color: white; font-family: system-ui, sans-serif;
    }
    .spinner {
      width: 36px; height: 36px; border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #D4A017; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading.hidden { display: none; }
  </style>
</head>
<body>
  <div id="loading">
    <h1 style="color:#D4A017">AgriSmartAI Admin</h1>
    <div class="spinner"></div>
    <p>Loading dashboard...</p>
  </div>
  <script>
    window.addEventListener('flutter-first-frame', function () {
      document.getElementById('loading')?.classList.add('hidden');
    });
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
